        :root {

        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }
        body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--text-dark); }

        /* NAV */
        .nav-link {

        .nav-link:hover { color: var(--navy); }
        .nav-link::after {
            content: ''; position: absolute; bottom: -2px; left: 0;
            width: 0; height: 1px; background: var(--accent); transition: width 0.3s;
        }
        .nav-link:hover::after { width: 100%; }

        /* DROPDOWN */
        .dropdown { position: relative; }
        .dropdown-trigger {
            display: flex; align-items: center; gap: 5px;
            cursor: default; font-size: 0.9rem; font-weight: 500;
            color: var(--text-mid); letter-spacing: 0.03em; position: relative; padding-bottom: 2px;
        }
        .dropdown-trigger::after {
            content: ''; position: absolute; bottom: -2px; left: 0;
            width: 0; height: 1px; background: var(--accent); transition: width 0.3s;
        }
        .dropdown:hover .dropdown-trigger { color: var(--navy); }
        .dropdown:hover .dropdown-trigger::after { width: 100%; }
        .chevron { width: 11px; height: 11px; transition: transform 0.25s; opacity: 0.45; flex-shrink: 0; }
        .dropdown:hover .chevron { transform: rotate(180deg); }
        .dropdown-menu {
            position: absolute; top: 100%; left: 50%;
            transform: translateX(-50%);
            padding-top: 14px;
            background: transparent;
            min-width: 190px; opacity: 0; pointer-events: none;
            transition: opacity 0.2s; z-index: 200;
        }
        .dropdown-menu-inner {
            background: white; border: 1px solid rgba(0,0,0,0.08);
            border-radius: 10px; box-shadow: 0 16px 48px rgba(0,0,0,0.13);
            overflow: hidden;
            transform: translateY(-4px);
            transition: transform 0.2s;
        }
        .dropdown:hover .dropdown-menu {
            opacity: 1; pointer-events: all;
        }
        .dropdown:hover .dropdown-menu-inner {
            transform: translateY(0);
        }
        .dropdown-item {
            display: block; padding: 12px 20px; font-size: 0.875rem;
            color: var(--text-mid); text-decoration: none;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            transition: background 0.15s, color 0.15s; font-weight: 500;
        }
        .dropdown-item:last-child { border-bottom: none; }
        .dropdown-item:hover { background: var(--cream); color: var(--navy); }
        .dropdown-item.featured { color: var(--accent-dark); background: rgba(200,169,110,0.06); }
        .dropdown-item.featured:hover { background: rgba(200,169,110,0.12); }

        /* HERO */
        .hero {
            min-height: 100vh; background: var(--navy);
            display: flex; align-items: center; position: relative; overflow: hidden;
        }
        .hero::before {
            content: ''; position: absolute; inset: 0;
            background: radial-gradient(ellipse at 75% 40%, rgba(200,169,110,0.1) 0%, transparent 55%);
        }
        .hero::after {
            content: ''; position: absolute; bottom: -1px; left: 0; right: 0; height: 80px;
            background: linear-gradient(to bottom, transparent, var(--navy) 60%);
        }

        /* PORTFOLIO CARD */
        .portfolio-card {
            position: relative; border-radius: 12px; overflow: hidden;
            cursor: pointer; aspect-ratio: 4/3; background: var(--navy-light);
        }
        .portfolio-card img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s, opacity 0.3s; }
        .portfolio-card:hover img { transform: scale(1.06); opacity: 0.55; }
        .card-overlay {
            position: absolute; inset: 0; display: flex; flex-direction: column;
            justify-content: flex-end; padding: 22px;
            background: linear-gradient(to top, rgba(15,25,45,0.95) 0%, rgba(15,25,45,0.3) 50%, transparent 100%);
        }
        .card-company { font-size: 0.68rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent); font-weight: 600; margin-bottom: 4px; }
        .card-title { font-family: 'DM Serif Display', serif; color: white; font-size: 1.1rem; line-height: 1.3; margin-bottom: 6px; }
        .card-sub {
            color: rgba(255,255,255,0.65); font-size: 0.78rem; font-weight: 400;
            opacity: 0; transform: translateY(5px); transition: opacity 0.3s, transform 0.3s;

        .timeline-item { position: relative; padding-left: 44px; padding-bottom: 140px; }
        .timeline-item:last-child { padding-bottom: 0; }
        .timeline-item::before {
            content: ''; position: absolute; left: 7px; top: 14px;
            width: 1px; height: calc(100% - 14px);
            background: linear-gradient(to bottom, rgba(200,169,110,0.5), rgba(200,169,110,0.05));
        }
        .timeline-item:last-child::before { display: none; }

            position: absolute; left: 0; top: 10px; width: 16px; height: 16px;
            border-radius: 50%; border: 2px solid var(--accent); background: var(--warm-gray); transition: background 0.2s;

const FadeUp = ({ children, delay = 0 }) => {
    const ref = useRef(null);
    useEffect(() => {
        const el = ref.current; if (!el) return;
        const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) { el.classList.add('visible'); obs.disconnect(); } }, { threshold: 0.08 });
        obs.observe(el);
        return () => obs.disconnect();
    }, []);
    return <div ref={ref} className="fade-up" style={{ transitionDelay:`${delay}ms` }}>{children}</div>;
};

                                    <button onClick={()=>setCareerPage('ocado')} className="dropdown-item" style={{width:'100%',textAlign:'left',fontFamily:"'DM Sans',sans-serif",border:'none',cursor:'pointer',background:'none'}}>Ocado Technology</button>
                                    <button onClick={()=>setCareerPage('neato')} className="dropdown-item" style={{width:'100%',textAlign:'left',fontFamily:"'DM Sans',sans-serif",border:'none',cursor:'pointer',background:'none'}}>Neato Robotics</button>
                                    <button onClick={()=>setCareerPage('kohler')} className="dropdown-item" style={{width:'100%',textAlign:'left',fontFamily:"'DM Sans',sans-serif",border:'none',cursor:'pointer',background:'none'}}>Kohler Company</button>
                                </div>
                            </div>
                        </div>

                        <button onClick={()=>scrollTo('portfolio')} className="nav-link" style={{background:'none',border:'none',cursor:'pointer',fontFamily:"'DM Sans',sans-serif",padding:'0 0 2px'}}>Portfolio</button>
                        <button onClick={()=>scrollTo('about')} className="nav-link" style={{background:'none',border:'none',cursor:'pointer',fontFamily:"'DM Sans',sans-serif",padding:'0 0 2px'}}>About</button>
                        <button onClick={()=>scrollTo('Resume')} className="nav-link" style={{background:'none',border:'none',cursor:'pointer',fontFamily:"'DM Sans',sans-serif",padding:'0 0 2px'}}>Resume</button>
                        <button onClick={()=>scrollTo('contact')} className="nav-link" style={{background:'var(--navy)',color:'white',padding:'8px 20px',borderRadius:6,fontWeight:500,fontSize:'0.85rem',letterSpacing:'0.04em',border:'none',cursor:'pointer',fontFamily:"'DM Sans',sans-serif",transition:'background 0.2s'}}
                            onMouseEnter={e=>e.currentTarget.style.background='var(--navy-light)'}
                            onMouseLeave={e=>e.currentTarget.style.background='var(--navy)'}
                        >Contact</button>
                    </div>
                </nav>
            </header>

            {/* ─── HERO ─── */}
            <section className="hero" style={{paddingTop:62}}>
                <div className="hero-grid" style={{maxWidth:1200,margin:'0 auto',padding:'0 48px',width:'100%',display:'grid',gridTemplateColumns:'1fr 1fr',gap:60,alignItems:'center'}}>
                    <div>
                        <div style={{fontSize:'1rem',letterSpacing:'0.12em',textTransform:'uppercase',color:'var(--accent)',fontWeight:600,marginBottom:18}}>Advanced Robotics Engineer · San Francisco</div>
                        <div style={{fontFamily:"'DM Serif Display',serif",fontSize:'clamp(3.2rem,7vw,5.5rem)',color:'white',lineHeight:1.02,marginBottom:20}}>
                            William<br/>Nuveen
                        </div>
                        <div style={{fontSize:'1.05rem',color:'rgba(255,255,255,0.5)',fontWeight:300,letterSpacing:'0.02em'}}>
                            Robotics · Product Design · Automation
                        </div>
                        <div style={{display:'flex',gap:12,marginTop:36,flexWrap:'wrap'}}>
                            <button
                                onClick={() => { const el = document.getElementById('portfolio'); if(el) window.scrollTo({top: el.offsetTop - 62, behavior:'smooth'}); }}
                                style={{display:'inline-block',background:'var(--accent)',color:'white',padding:'13px 30px',borderRadius:6,fontWeight:500,fontSize:'0.88rem',letterSpacing:'0.05em',border:'none',cursor:'pointer',fontFamily:"'DM Sans',sans-serif",transition:'background 0.2s,transform 0.15s'}}
                                onMouseEnter={e=>{e.currentTarget.style.background='var(--accent-dark)';e.currentTarget.style.transform='translateY(-1px)';}}
                                onMouseLeave={e=>{e.currentTarget.style.background='var(--accent)';e.currentTarget.style.transform='translateY(0)';}}
                            >View Portfolio</button>
                            <button
                                onClick={() => { const el = document.getElementById('multiply-labs'); if(el) window.scrollTo({top: el.offsetTop - 62, behavior:'smooth'}); }}
                                style={{display:'inline-block',background:'rgba(255,255,255,0.08)',color:'rgba(255,255,255,0.8)',border:'1px solid rgba(255,255,255,0.15)',padding:'13px 30px',borderRadius:6,fontWeight:500,fontSize:'0.88rem',letterSpacing:'0.05em',cursor:'pointer',fontFamily:"'DM Sans',sans-serif",transition:'background 0.2s'}}
                                onMouseEnter={e=>e.currentTarget.style.background='rgba(255,255,255,0.14)'}
                                onMouseLeave={e=>e.currentTarget.style.background='rgba(255,255,255,0.08)'}
                            >Current Work ↓</button>
                        </div>
                    </div>
                    <div className="hero-photo-wrap" style={{display:'flex',justifyContent:'flex-end'}}>
                        <img src="WilliamNuveenPortrait.jpg" alt="William Nuveen"
                            style={{width:'100%',maxWidth:400,aspectRatio:'3/4',objectFit:'cover',borderRadius:16,boxShadow:'0 40px 100px rgba(0,0,0,0.5)'}} />
                    </div>
                </div>
            </section>

            {/* ─── MULTIPLY LABS ─── */}
            <MultiplyLabsSection onOpenCareer={setCareerPage} />

            {/* ─── PORTFOLIO ─── */}
            <section id="portfolio" style={{padding:'100px 0',background:'var(--cream)'}}>
                <div style={{maxWidth:1200,margin:'0 auto',padding:'0 48px'}}>
                    <FadeUp>
                        <div style={{marginBottom:52}}>
                            <SectionLabel>Design Portfolio</SectionLabel>
                            <div style={{fontFamily:"'DM Serif Display',serif",fontSize:'clamp(2.5rem,5vw,3.8rem)',color:'var(--navy)',lineHeight:1.1}}>Mechanical Design Projects</div>
                            <p style={{color:'var(--text-light)',marginTop:12,fontSize:'0.85rem'}}>Click any project to learn more</p>
                        </div>
                    </FadeUp>
                    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(290px,1fr))',gap:18}}>
                        {portfolioItems.map((item,i) => (
                            <FadeUp key={i} delay={i*55}>
                                <div className="portfolio-card" onClick={() => setSelectedItem(item)}>
                                    <img src={item.image} alt={item.title} />
                                    <div className="card-overlay">
                                        <div className="card-company">{item.company}</div>
                                        <div className="card-title">{item.title}</div>
                                        <div className="card-sub">{item.shortDescription}</div>
                                    </div>
                                </div>
                            </FadeUp>
                        ))}
                    </div>
                </div>
            </section>

            {/* ─── EXPERIENCE ─── */}
            <section id="experience" style={{padding:'100px 0',background:'var(--warm-gray)'}}>
                <div style={{maxWidth:1200,margin:'0 auto',padding:'0 48px',display:'grid',gridTemplateColumns:'1fr 2fr',gap:80}} className="two-col">
                    <FadeUp>
                        <div style={{position:'sticky',top:90}}>
                            <SectionLabel>Work History</SectionLabel>
                            <div style={{fontFamily:"'DM Serif Display',serif",fontSize:'clamp(2rem,4vw,2.8rem)',color:'var(--navy)',lineHeight:1.1,marginBottom:20}}>Experience</div>
                            <p style={{color:'var(--text-mid)',lineHeight:1.8,fontSize:'0.95rem'}}>
                                From consumer robotics to cutting-edge biotech automation, I've built systems that ship and scale.
                            </p>
                        </div>
                    </FadeUp>
                    <div>
                        {experiences.map((job,i) => (
                            <FadeUp key={i} delay={i*70}>
                                <div className="timeline-item">
                                    <div className="timeline-dot" style={job.isNew?{background:'var(--accent)',borderColor:'var(--accent)'}:{}}></div>
                                    <div style={{fontSize:'1.1rem',letterSpacing:'0.14em',textTransform:'uppercase',color:'var(--accent)',fontWeight:600,marginBottom:8}}>{job.company}</div>
                                    <div style={{fontFamily:"'DM Serif Display',serif",fontSize:'2.1rem',color:'var(--navy)',marginBottom:10,lineHeight:1.15}}>{job.title}</div>
                                    <div style={{fontSize:'0.95rem',color:'var(--text-light)',marginBottom:16}}>{job.location} · {job.dates}</div>
                                    <div style={{fontSize:'0.94rem',color:'var(--text-mid)',lineHeight:1.8,maxWidth:560}}>{job.description}</div>
                                    <div style={{marginTop:20,display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
                                        {job.isNew && (
                                            <span style={{display:'inline-block',background:'rgba(200,169,110,0.12)',color:'var(--accent-dark)',border:'1px solid rgba(200,169,110,0.3)',padding:'3px 10px',borderRadius:4,fontSize:'0.7rem',letterSpacing:'0.1em',textTransform:'uppercase',fontWeight:600}}>Current</span>
                                        )}
                                        <button onClick={()=>setCareerPage(job.pageKey)}
                                            style={{background:'none',border:'1px solid rgba(0,0,0,0.15)',borderRadius:4,padding:'3px 12px',fontSize:'0.75rem',color:'var(--text-mid)',cursor:'pointer',fontFamily:"'DM Sans',sans-serif",fontWeight:500,letterSpacing:'0.04em',transition:'all 0.15s'}}
                                            onMouseEnter={e=>{e.currentTarget.style.background='var(--navy)';e.currentTarget.style.color='white';e.currentTarget.style.borderColor='var(--navy)';}}
                                            onMouseLeave={e=>{e.currentTarget.style.background='none';e.currentTarget.style.color='var(--text-mid)';e.currentTarget.style.borderColor='rgba(0,0,0,0.15)';}}
                                        >Read More ↗</button>
                                    </div>
                                </div>
                            </FadeUp>
                        ))}
                    </div>
                </div>
            </section>

            {/* ─── SKILLS ─── */}
            <section style={{padding:'80px 0',background:'var(--navy)'}}>
                <div style={{maxWidth:1200,margin:'0 auto',padding:'0 48px',textAlign:'center'}}>
                    <FadeUp>
                        <SectionLabel>Capabilities</SectionLabel>
                        <div style={{fontFamily:"'DM Serif Display',serif",fontSize:'clamp(1.8rem,3.5vw,2.5rem)',color:'white',marginBottom:44}}>Key Skills</div>
                        <div style={{display:'flex',flexWrap:'wrap',gap:10,justifyContent:'center'}}>
                            {['Product Design & Development','Mass Manufacturing','Automation & Robotics','Electromechanical Systems','GD&T & Tolerancing','DFM&A','SolidWorks / Onshape','System Integration'].map(s => (
                                <div key={s} style={{display:'inline-flex',alignItems:'center',gap:8,background:'rgba(255,255,255,0.07)',border:'1px solid rgba(255,255,255,0.11)',borderRadius:50,padding:'12px 26px',fontSize:'1.05rem',fontWeight:500,color:'rgba(255,255,255,0.85)'}}>
                                    <div style={{width:7,height:7,borderRadius:'50%',background:'var(--accent)',flexShrink:0}}></div>
                                    {s}
                                </div>
                            ))}
                        </div>
                    </FadeUp>
                </div>
            </section>

            {/* ─── ABOUT / PHOTOS ─── */}
            <AboutSection />

            {/* ─── RESUME ─── */}
            <section id="Resume" style={{padding:'100px 0',background:'var(--warm-gray)'}}>
                <div style={{maxWidth:1200,margin:'0 auto',padding:'0 48px',display:'grid',gridTemplateColumns:'1fr 1fr',gap:80,alignItems:'center'}} className="two-col">
                    <FadeUp>
                        <img src="resume-preview.png" alt="Resume Preview"
                            style={{width:'100%',maxWidth:380,borderRadius:12,boxShadow:'0 24px 64px rgba(0,0,0,0.14)',display:'block',margin:'0 auto'}} />
                    </FadeUp>
                    <FadeUp delay={100}>
                        <div>
                            <div style={{fontFamily:"'DM Serif Display',serif",fontSize:'clamp(2.5rem,5vw,3.8rem)',color:'var(--navy)',lineHeight:1.05,marginBottom:20}}>Résumé</div>
                            <p style={{color:'var(--text-mid)',lineHeight:1.8,fontSize:'0.97rem',marginBottom:32}}>
                                As an advanced robotics engineer, I specialize in consumable design for therapeutic robotics, AI-driven robotic systems, and cost-efficient mass manufacturing. With a passion for innovation, I create solutions that turn concepts into deployable, scalable hardware.
                            </p>
                            <a href="William Nuveen's Resume (Oct. 24).pdf" target="_blank" rel="noopener noreferrer"
                                style={{display:'inline-block',background:'var(--accent)',color:'white',padding:'13px 30px',borderRadius:6,fontWeight:500,fontSize:'0.88rem',letterSpacing:'0.05em',textDecoration:'none',transition:'background 0.2s'}}
                                onMouseEnter={e=>e.target.style.background='var(--accent-dark)'}
                                onMouseLeave={e=>e.target.style.background='var(--accent)'}
                            >View Resume →</a>
                        </div>
                    </FadeUp>
                </div>
            </section>

            {/* ─── CONTACT ─── */}
            <section id="contact" style={{background:'var(--navy)',padding:'100px 0'}}>
                <div style={{maxWidth:1200,margin:'0 auto',padding:'0 48px',textAlign:'center'}}>
                    <FadeUp>
                        <SectionLabel>Get In Touch</SectionLabel>
                        <div style={{fontFamily:"'DM Serif Display',serif",fontSize:'clamp(2.5rem,5vw,4rem)',color:'white',lineHeight:1.05,marginBottom:24}}>
                            Let's Build<br/><span style={{fontStyle:'italic'}}>Something Great</span>
                        </div>
                        <p style={{color:'rgba(255,255,255,0.45)',fontSize:'0.97rem',marginBottom:16,maxWidth:520,margin:'0 auto 16px'}}>
                            San Francisco, CA &nbsp;·&nbsp; wnuveen3@gmail.com
                        </p>
                        <p style={{color:'rgba(255,255,255,0.35)',fontSize:'0.9rem',marginBottom:44,maxWidth:520,margin:'0 auto 44px'}}>
                            Open to consulting on product design, consumables engineering, and robotics hardware — get in touch to discuss your project.
                        </p>
                        <a href="mailto:wnuveen3@gmail.com"
                            style={{display:'inline-block',background:'var(--accent)',color:'white',padding:'14px 38px',borderRadius:6,fontWeight:500,fontSize:'0.9rem',letterSpacing:'0.06em',textDecoration:'none',transition:'background 0.2s,transform 0.15s'}}
                            onMouseEnter={e=>{e.target.style.background='var(--accent-dark)';e.target.style.transform='translateY(-1px)';}}
                            onMouseLeave={e=>{e.target.style.background='var(--accent)';e.target.style.transform='translateY(0)';}}
                        >Say Hello →</a>
                    </FadeUp>
                </div>
            </section>

            {/* ─── FOOTER ─── */}
            <footer style={{background:'#111820',padding:'28px 48px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <p style={{color:'rgba(255,255,255,0.28)',fontSize:'0.8rem'}}>© 2026 William Nuveen. All Rights Reserved.</p>
                <a href="https://www.linkedin.com/in/williamnuveen/" target="_blank" rel="noopener noreferrer"
                    style={{color:'rgba(255,255,255,0.35)',transition:'color 0.2s'}}
                    onMouseEnter={e=>e.target.style.color='rgba(255,255,255,0.7)'}
                    onMouseLeave={e=>e.target.style.color='rgba(255,255,255,0.35)'}
                    aria-label="LinkedIn">
                    <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
                    </svg>
                </a>
            </footer>

            {selectedItem && <Modal item={selectedItem} onClose={() => setSelectedItem(null)} />}
            {careerPage && <CareerPage pageKey={careerPage} onClose={() => setCareerPage(null)} />}
        </div>
    );
};

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
